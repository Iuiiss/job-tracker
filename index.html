<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobBoard Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #0f1117 0%, #1a1d27 100%);
      color: #e2e8f0;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #7c8dff, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #8892b0;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .column {
      background: #1a1d27;
      border: 1px solid #2e3350;
      border-radius: 12px;
      padding: 20px;
      min-height: 600px;
      display: flex;
      flex-direction: column;
    }

    .column-title {
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7c8dff;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #2e3350;
    }

    .jobs {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .job {
      background: #0f1117;
      border: 1px solid #2e3350;
      border-radius: 8px;
      padding: 14px;
      cursor: grab;
      transition: all 0.2s;
      user-select: none;
    }

    .job:hover {
      border-color: #7c8dff;
      box-shadow: 0 4px 12px rgba(124, 141, 255, 0.15);
    }

    .job:active {
      cursor: grabbing;
      opacity: 0.8;
    }

    .job.dragging {
      opacity: 0.5;
    }

    .job-company {
      font-size: 0.8rem;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .job-role {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 8px;
      color: #e2e8f0;
    }

    .job-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .job-salary {
      font-size: 0.75rem;
      background: rgba(124, 141, 255, 0.1);
      color: #7c8dff;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .job-source {
      font-size: 0.75rem;
      background: rgba(56, 189, 248, 0.1);
      color: #38bdf8;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .job-date {
      font-size: 0.7rem;
      color: #8892b0;
      margin-top: 8px;
    }

    .job-link {
      font-size: 0.7rem;
      color: #7c8dff;
      text-decoration: none;
      margin-top: 8px;
      word-break: break-all;
    }

    .job-link:hover {
      text-decoration: underline;
    }

    .empty {
      text-align: center;
      color: #8892b0;
      font-size: 0.9rem;
      padding: 40px 0;
      opacity: 0.6;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 30px;
    }

    button {
      background: #7c8dff;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #2e3350;
      color: #e2e8f0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #2e3350;
    }

    .stat {
      background: #1a1d27;
      border: 1px solid #2e3350;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #7c8dff;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #8892b0;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  const STORAGE_KEY = "jobtracker_jobs";
  let draggedJob = null;

  // Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyCvJl9E6FvzqlO-r0eoIH_tZ38u-uRQ8II",
    authDomain: "job-tracker-a4481.firebaseapp.com",
    projectId: "job-tracker-a4481",
    storageBucket: "job-tracker-a4481.firebasestorage.app",
    messagingSenderId: "706534879668",
    appId: "1:706534879668:web:1fedadee20b36ae44882e1"
  };

  // Initialize Firebase
  let db = null;
  try {
    if (firebase.apps.length === 0) {
      firebase.initializeApp(firebaseConfig);
    }
    db = firebase.firestore();
    console.log("[JobBoard] Firestore initialized");
  } catch (e) {
    console.warn("[JobBoard] Firestore init failed:", e);
  }

  // Normalize job data: ensure 'role' field exists (fallback to 'title' for old jobs)
  function normalizeJobs(jobs) {
    return jobs.map(job => {
      if (!job.role && job.title) {
        job.role = job.title;
      }
      return job;
    });
  }

  // Load and render jobs on page load
  document.addEventListener("DOMContentLoaded", () => {
    loadAndRenderJobs();
    // Refresh every 2 seconds to catch updates from the extension
    setInterval(loadAndRenderJobs, 2000);
  });

  async function loadAndRenderJobs() {
    let jobs = [];

    // Try loading from Firestore first
    if (db) {
      try {
        console.log("[JobBoard] Querying Firestore...");
        const snapshot = await db.collection("jobs").get();
        console.log("[JobBoard] Firestore returned", snapshot.docs.length, "documents");
        jobs = snapshot.docs.map(doc => {
          const data = doc.data();
          // Normalize: some old jobs might have 'title' instead of 'role'
          if (!data.role && data.title) {
            data.role = data.title;
          }
          return { id: doc.id, ...data };
        });
        // Cache in localStorage for offline use
        localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
        console.log("[JobBoard] Loaded", jobs.length, "jobs from Firestore");
      } catch (e) {
        console.error("[JobBoard] Firestore query error:", e);
        console.warn("[JobBoard] Falling back to localStorage");
        jobs = normalizeJobs(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));
      }
    } else {
      console.warn("[JobBoard] Firebase db not initialized, using localStorage");
      jobs = normalizeJobs(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));
    }
    
    // Clear all job containers
    document.querySelectorAll(".jobs").forEach(col => {
      col.innerHTML = "";
    });

    // Render jobs in their respective columns
    jobs.forEach(job => {
      renderJob(job);
    });

    // Update stats
    updateStats(jobs);
  }

  function renderJob(job) {
    // Normalize: some old jobs might have 'title' instead of 'role'
    if (!job.role && job.title) {
      job.role = job.title;
    }
    
    const status = (job.status || "wishlist").toLowerCase();
    let jobsContainer = document.querySelector(`.jobs[data-status="${status}"]`);
    
    // If status doesn't match any column, default to wishlist
    if (!jobsContainer) {
      jobsContainer = document.querySelector('.jobs[data-status="wishlist"]');
    }
    
    const jobEl = document.createElement("div");
    jobEl.className = "job";
    jobEl.draggable = true;
    jobEl.dataset.jobId = job.id;
    jobEl.innerHTML = `
      <div class="job-company">${job.company || "Unknown"}</div>
      <div class="job-role">${job.role || job.title || "Job Title"}</div>
      <div class="job-meta">
        ${job.salary ? `<span class="job-salary">💰 ${job.salary}</span>` : ""}
        ${job.source ? `<span class="job-source">${job.source}</span>` : ""}
      </div>
      <div class="job-date">${new Date(job.date).toLocaleDateString()}</div>
      ${job.link ? `<a href="${job.link}" target="_blank" class="job-link">View Job →</a>` : ""}
    `;

    // Drag events
    jobEl.addEventListener("dragstart", (e) => {
      draggedJob = job;
      jobEl.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });

    jobEl.addEventListener("dragend", () => {
      jobEl.classList.remove("dragging");
      draggedJob = null;
    });

    jobsContainer.appendChild(jobEl);
  }

  function updateStats(jobs) {
    document.getElementById("total").textContent = jobs.length;
    document.getElementById("applied").textContent = jobs.filter(j => j.status === "applied").length;
    document.getElementById("interviews").textContent = jobs.filter(j => j.status === "interview").length;
    document.getElementById("offers").textContent = jobs.filter(j => j.status === "offer").length;
  }

  // Handle drag over
  document.querySelectorAll(".jobs").forEach(col => {
    col.addEventListener("dragover", (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      col.style.opacity = "0.8";
    });

    col.addEventListener("dragleave", () => {
      col.style.opacity = "1";
    });

    col.addEventListener("drop", (e) => {
      e.preventDefault();
      col.style.opacity = "1";

      if (draggedJob) {
        const newStatus = col.dataset.status;
        draggedJob.status = newStatus;

        // Save updated job
        const jobs = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        const index = jobs.findIndex(j => j.id === draggedJob.id);
        if (index !== -1) {
          jobs[index] = draggedJob;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
          
          // Also update in Firestore
          updateJobStatusInFirestore(draggedJob.id, newStatus);
          
          loadAndRenderJobs();
        }
      }
    });
  });

  async function updateJobStatusInFirestore(jobId, newStatus) {
    if (!db) return;
    try {
      await db.collection("jobs").doc(jobId).update({ status: newStatus });
    } catch (e) {
      console.warn("[JobBoard] Failed to update Firestore:", e);
    }
  }

  function exportJobs() {
    const jobs = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    const dataStr = JSON.stringify(jobs, null, 2);
    const dataBlob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(dataBlob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `jobboard-${new Date().toISOString().split("T")[0]}.json`;
    link.click();
    URL.revokeObjectURL(url);
  }

  function importJobs(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const jobs = JSON.parse(e.target.result);
        if (!Array.isArray(jobs)) {
          alert("Invalid format! File must contain a JSON array of jobs.");
          return;
        }
        
        // Merge with existing jobs (avoid duplicates by link)
        const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        const existingLinks = new Set(existing.map(j => j.link));
        
        const newJobs = jobs.filter(j => !existingLinks.has(j.link));
        const merged = [...existing, ...newJobs];
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
        
        // Sync new jobs to Firestore
        if (db) {
          for (const job of newJobs) {
            await db.collection("jobs").add(job);
          }
        }
        
        loadAndRenderJobs();
        alert(`Imported ${newJobs.length} new jobs!`);
      } catch (error) {
        alert("Error importing file: " + error.message);
      }
    };
    reader.readAsText(file);
    
    // Reset file input so same file can be imported again
    event.target.value = "";
  }

  async function syncLocalStorageToFirestore() {
    if (!db) {
      alert("Firebase not initialized. Check console for errors.");
      return;
    }
    
    const localJobs = normalizeJobs(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));
    
    if (localJobs.length === 0) {
      alert("No jobs in localStorage to sync.");
      return;
    }
    
    // Get existing Firestore jobs to check for duplicates by link
    const existingSnapshot = await db.collection("jobs").get();
    const existingLinks = new Set(
      existingSnapshot.docs.map(doc => doc.data().link).filter(Boolean)
    );
    
    let successCount = 0;
    let skippedCount = 0;
    let failCount = 0;
    
    for (const job of localJobs) {
      try {
        if (job.link && existingLinks.has(job.link)) {
          console.log("[JobBoard] Skipping duplicate:", job.link);
          skippedCount++;
          continue;
        }
        
        // Generate new Firestore ID (don't reuse localStorage ID)
        const docRef = await db.collection("jobs").add(job);
        console.log("[JobBoard] Synced job with new ID:", docRef.id);
        successCount++;
      } catch (e) {
        console.error("[JobBoard] Failed to sync job:", job.id || job.link, e);
        failCount++;
      }
    }
    
    // Refresh from Firestore
    await loadAndRenderJobs();
    
    const confirmed = confirm(`Sync complete!\n✓ ${successCount} jobs uploaded to cloud\n⏭️ ${skippedCount} duplicates skipped\n✗ ${failCount} failed\n\nClear localStorage now?`);
    
    if (confirmed) {
      localStorage.clear();
      await loadAndRenderJobs();
      alert("localStorage cleared! Your jobs are now synced with Firebase.");
    }
  }

  async function clearAllJobs() {
    if (confirm("Are you sure? This will delete all jobs.")) {
      localStorage.setItem(STORAGE_KEY, "[]");
      
      // Clear from Firestore
      if (db) {
        try {
          const snapshot = await db.collection("jobs").get();
          const batch = db.batch();
          snapshot.docs.forEach(doc => batch.delete(doc.ref));
          await batch.commit();
        } catch (e) {
          console.warn("[JobBoard] Failed to clear Firestore:", e);
        }
      }
      
      loadAndRenderJobs();
    }
  }
</script>

<div class="container">
  <h1>JobBoard Tracker</h1>
  <p class="subtitle">Drag jobs between columns to update their status</p>

  <div class="controls">
    <button onclick="exportJobs()">📥 Export as JSON</button>
    <input type="file" id="import-input" style="display: none;" onchange="importJobs(event)">
    <button onclick="document.getElementById('import-input').click()">📤 Import from JSON</button>
    <button class="btn-secondary" onclick="clearAllJobs()">🗑️ Clear All</button>
    <button class="btn-secondary" onclick="syncLocalStorageToFirestore()">☁️ Sync to Cloud</button>
  </div>

  <div class="board">
    <div class="column">
      <div class="column-title">⭐ Wishlist</div>
      <div class="jobs" data-status="wishlist"></div>
      <div class="empty">Drag jobs here</div>
    </div>

    <div class="column">
      <div class="column-title">✍️ Applied</div>
      <div class="jobs" data-status="applied"></div>
      <div class="empty">Drag jobs here</div>
    </div>

    <div class="column">
      <div class="column-title">💬 Interview</div>
      <div class="jobs" data-status="interview"></div>
      <div class="empty">Drag jobs here</div>
    </div>

    <div class="column">
      <div class="column-title">🎉 Offer</div>
      <div class="jobs" data-status="offer"></div>
      <div class="empty">Drag jobs here</div>
    </div>

    <div class="column">
      <div class="column-title">❌ Rejected</div>
      <div class="jobs" data-status="rejected"></div>
      <div class="empty">Drag jobs here</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="total">0</div>
      <div class="stat-label">Total Jobs</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="applied">0</div>
      <div class="stat-label">Applied</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="interviews">0</div>
      <div class="stat-label">Interviews</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="offers">0</div>
      <div class="stat-label">Offers</div>
    </div>
  </div>
</div>

</body>
</html>
