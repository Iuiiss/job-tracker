<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobBoard Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #0f1117 0%, #1a1d27 100%);
      color: #e2e8f0;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #7c8dff, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #8892b0;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .column {
      background: #1a1d27;
      border: 1px solid #2e3350;
      border-radius: 12px;
      padding: 20px;
      min-height: 600px;
      display: flex;
      flex-direction: column;
    }

    .column-title {
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7c8dff;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #2e3350;
    }

    .jobs {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .job {
      background: #0f1117;
      border: 1px solid #2e3350;
      border-radius: 8px;
      padding: 14px;
      cursor: grab;
      transition: all 0.2s;
      user-select: none;
    }

    .job:hover {
      border-color: #7c8dff;
      box-shadow: 0 4px 12px rgba(124, 141, 255, 0.15);
    }

    .job:active {
      cursor: grabbing;
      opacity: 0.8;
    }

    .job.dragging {
      opacity: 0.5;
    }

    .job-company {
      font-size: 0.8rem;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .job-role {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 8px;
      color: #e2e8f0;
    }

    .job-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .job-salary {
      font-size: 0.75rem;
      background: rgba(124, 141, 255, 0.1);
      color: #7c8dff;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .job-source {
      font-size: 0.75rem;
      background: rgba(56, 189, 248, 0.1);
      color: #38bdf8;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .job-date {
      font-size: 0.7rem;
      color: #8892b0;
      margin-top: 8px;
    }

    .job-link {
      font-size: 0.7rem;
      color: #7c8dff;
      text-decoration: none;
      margin-top: 8px;
      word-break: break-all;
    }

    .job-link:hover {
      text-decoration: underline;
    }

    .empty {
      text-align: center;
      color: #8892b0;
      font-size: 0.9rem;
      padding: 40px 0;
      opacity: 0.6;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 30px;
    }

    button {
      background: #7c8dff;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #2e3350;
      color: #e2e8f0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #2e3350;
    }

    .stat {
      background: #1a1d27;
      border: 1px solid #2e3350;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #7c8dff;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #8892b0;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>JobBoard Tracker</h1>
  <p class="subtitle">Drag jobs between columns to update their status</p>

  <div class="controls">
    <button onclick="exportJobs()">📥 Export as JSON</button>
    <button class="btn-secondary" onclick="clearAllJobs()">🗑️ Clear All</button>
  </div>

  <div class="board">
    <div class="column">
      <div class="column-title">⭐ Wishlist</div>
      <div class="jobs" data-status="wishlist"></div>
      <div class="empty">Drag jobs here</div>
    </div>

    <div class="column">
      <div class="column-title">✍️ Applied</div>
      <div class="jobs" data-status="applied"></div>
      <div class="empty">Drag jobs here</div>
    </div>

    <div class="column">
      <div class="column-title">💬 Interview</div>
      <div class="jobs" data-status="interview"></div>
      <div class="empty">Drag jobs here</div>
    </div>

    <div class="column">
      <div class="column-title">🎉 Offer</div>
      <div class="jobs" data-status="offer"></div>
      <div class="empty">Drag jobs here</div>
    </div>

    <div class="column">
      <div class="column-title">❌ Rejected</div>
      <div class="jobs" data-status="rejected"></div>
      <div class="empty">Drag jobs here</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="total">0</div>
      <div class="stat-label">Total Jobs</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="applied">0</div>
      <div class="stat-label">Applied</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="interviews">0</div>
      <div class="stat-label">Interviews</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="offers">0</div>
      <div class="stat-label">Offers</div>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = "jobtracker_jobs";
  let draggedJob = null;

  // Load and render jobs on page load
  document.addEventListener("DOMContentLoaded", () => {
    loadAndRenderJobs();
    // Refresh every 2 seconds to catch updates from the extension
    setInterval(loadAndRenderJobs, 2000);
  });

  function loadAndRenderJobs() {
    const jobs = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    
    // Clear all job containers
    document.querySelectorAll(".jobs").forEach(col => {
      col.innerHTML = "";
    });

    // Render jobs in their respective columns
    jobs.forEach(job => {
      renderJob(job);
    });

    // Update stats
    updateStats(jobs);
  }

  function renderJob(job) {
    const status = job.status || "wishlist";
    const jobsContainer = document.querySelector(`.jobs[data-status="${status}"]`);
    
    if (!jobsContainer) return;

    const jobEl = document.createElement("div");
    jobEl.className = "job";
    jobEl.draggable = true;
    jobEl.dataset.jobId = job.id;
    jobEl.innerHTML = `
      <div class="job-company">${job.company || "Unknown"}</div>
      <div class="job-role">${job.role || "Job Title"}</div>
      <div class="job-meta">
        ${job.salary ? `<span class="job-salary">💰 ${job.salary}</span>` : ""}
        ${job.source ? `<span class="job-source">${job.source}</span>` : ""}
      </div>
      <div class="job-date">${new Date(job.date).toLocaleDateString()}</div>
      ${job.link ? `<a href="${job.link}" target="_blank" class="job-link">View Job →</a>` : ""}
    `;

    // Drag events
    jobEl.addEventListener("dragstart", (e) => {
      draggedJob = job;
      jobEl.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });

    jobEl.addEventListener("dragend", () => {
      jobEl.classList.remove("dragging");
      draggedJob = null;
    });

    jobsContainer.appendChild(jobEl);
  }

  function updateStats(jobs) {
    document.getElementById("total").textContent = jobs.length;
    document.getElementById("applied").textContent = jobs.filter(j => j.status === "applied").length;
    document.getElementById("interviews").textContent = jobs.filter(j => j.status === "interview").length;
    document.getElementById("offers").textContent = jobs.filter(j => j.status === "offer").length;
  }

  // Handle drag over
  document.querySelectorAll(".jobs").forEach(col => {
    col.addEventListener("dragover", (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      col.style.opacity = "0.8";
    });

    col.addEventListener("dragleave", () => {
      col.style.opacity = "1";
    });

    col.addEventListener("drop", (e) => {
      e.preventDefault();
      col.style.opacity = "1";

      if (draggedJob) {
        const newStatus = col.dataset.status;
        draggedJob.status = newStatus;

        // Save updated job
        const jobs = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        const index = jobs.findIndex(j => j.id === draggedJob.id);
        if (index !== -1) {
          jobs[index] = draggedJob;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
          loadAndRenderJobs();
        }
      }
    });
  });

  function exportJobs() {
    const jobs = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    const dataStr = JSON.stringify(jobs, null, 2);
    const dataBlob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(dataBlob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `jobboard-${new Date().toISOString().split("T")[0]}.json`;
    link.click();
    URL.revokeObjectURL(url);
  }

  function clearAllJobs() {
    if (confirm("Are you sure? This will delete all jobs.")) {
      localStorage.setItem(STORAGE_KEY, "[]");
      loadAndRenderJobs();
    }
  }
</script>

</body>
</html>
